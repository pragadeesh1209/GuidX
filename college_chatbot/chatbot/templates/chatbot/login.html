<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GuidX</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--teal-dk:#116466;--teal-lt:#22959a;--sand:#D9B08C;--sand-lt:#FFCB9A;--mint:#D1E8E2;--bg:#1b2724;--surface:#222e2b;--surface2:#2a3835;--border:rgba(17,100,102,0.4);--text:#D1E8E2;--text2:#9bbfb9;--text3:#5f8a84;--glow:rgba(17,100,102,0.45);--error:#ff5f5f;--success:#2dd4a0;}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
        body{font-family:"Space Grotesk",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;}
        body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(17,100,102,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(17,100,102,0.05) 1px,transparent 1px);background-size:44px 44px;z-index:0;}
        .blob{position:fixed;border-radius:50%;z-index:0;pointer-events:none;}
        .blob-1{width:500px;height:500px;background:radial-gradient(circle,rgba(17,100,102,0.18) 0%,transparent 70%);top:-150px;right:-150px;}
        .blob-2{width:350px;height:350px;background:radial-gradient(circle,rgba(217,176,140,0.1) 0%,transparent 70%);bottom:-100px;left:-100px;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:430px;position:relative;z-index:10;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
        .brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;}
        .brand-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--teal-dk),var(--teal-lt));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:"Orbitron",sans-serif;font-size:20px;font-weight:900;color:var(--mint);box-shadow:0 0 20px var(--glow);}
        .brand-name{font-family:"Orbitron",sans-serif;font-size:1.6rem;font-weight:900;color:var(--mint);}
        .brand-name .x{color:var(--sand-lt);}
        .card-title{font-family:"Orbitron",sans-serif;font-size:0.85rem;color:var(--sand);text-transform:uppercase;letter-spacing:0.2em;text-align:center;margin-bottom:32px;margin-top:6px;}
        .form-group{margin-bottom:20px;}
        label{display:block;font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
        input{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:0.95rem;outline:none;transition:all 0.2s;}
        input:focus{border-color:var(--teal-lt);box-shadow:0 0 0 3px rgba(17,100,102,0.2);}
        input::placeholder{color:var(--text3);}
        .error-box{background:rgba(255,95,95,0.1);border:1px solid rgba(255,95,95,0.4);border-radius:10px;padding:12px 16px;font-size:0.85rem;color:var(--error);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
        .success-box{background:rgba(45,212,160,0.1);border:1px solid rgba(45,212,160,0.4);border-radius:10px;padding:12px 16px;font-size:0.85rem;color:var(--success);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
        .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal-dk),var(--teal-lt));color:var(--mint);border:none;border-radius:10px;font-family:"Space Grotesk",sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.25s;box-shadow:0 8px 24px var(--glow);margin-top:8px;}
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px var(--glow);}
        .divider{text-align:center;color:var(--text3);font-size:0.8rem;margin:20px 0;position:relative;}
        .divider::before{content:"";position:absolute;left:0;top:50%;width:42%;height:1px;background:var(--border);}
        .divider::after{content:"";position:absolute;right:0;top:50%;width:42%;height:1px;background:var(--border);}
        .guest-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;font-family:"Space Grotesk",sans-serif;font-size:0.9rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;text-align:center;}
        .guest-btn:hover{border-color:var(--teal-lt);color:var(--mint);background:rgba(17,100,102,0.1);}
        .foot{margin-top:24px;text-align:center;font-size:0.85rem;color:var(--text3);}
        .foot a{color:var(--sand);text-decoration:none;font-weight:600;}
        .foot a:hover{color:var(--sand-lt);}
        .back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:24px;color:var(--text3);font-size:0.82rem;text-decoration:none;transition:color 0.2s;}
        .back-link:hover{color:var(--mint);}
    </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="card">
    <a href="/chatbot/home/" class="back-link">&#8592; Back to Home</a>
    <div class="brand">
        <div class="brand-icon">G</div>
        <div class="brand-name">Guid<span class="x">X</span></div>
    </div>
    <div class="card-title">Sign In to Your Account</div>
    {% if request.GET.signup == "success" %}
    <div class="success-box">&#10003; Account created! Please sign in.</div>
    {% endif %}
    {% if error %}
    <div class="error-box">&#9888; {{ error }}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required value="{{ email_value }}">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="submit-btn">Sign In &#8594;</button>
    </form>
    <div class="divider">or</div>
    <a href="/chatbot/" class="guest-btn">Continue as Guest (history not saved)</a>
    <div class="foot">
        Do not have an account? <a href="/chatbot/signup/">Create one free</a>
    </div>
</div>
</body>
</html>
